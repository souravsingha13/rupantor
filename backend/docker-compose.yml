version: '3.8'

services:
  db:
    image: postgres:15-alpine
    container_name: salon_db
    restart: always
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: Postgres@123
      POSTGRES_DB: rupantor
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d rupantor"]
      interval: 5s
      timeout: 5s
      retries: 5

  backend:
    build: .
    container_name: salon_backend
    restart: always
    ports:
      - "8001:8001"
    volumes:
      - .:/app
    environment:
      - DATABASE_URL=postgresql+psycopg://postgres:Postgres%40123@db:5432/rupantor
      - SECRET_KEY=your_secret_key
      - ALGORITHM=HS256
      - ACCESS_TOKEN_EXPIRE_MINUTES=30
      - REFRESH_TOKEN_EXPIRE_DAYS=7
    command: uvicorn main:app --host 0.0.0.0 --port 8001 --reload
    depends_on:
      db:
        condition: service_healthy

volumes:
  postgres_data:
